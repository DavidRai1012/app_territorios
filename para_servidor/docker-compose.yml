services:
  app:
    build: .
    expose:
      - "3000"
    volumes:
      - ./data.json:/app/data.json
      - ./data/mapas:/app/data/mapas
      - ./activity_log.json:/app/activity_log.json
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
